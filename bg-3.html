<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        
        #container{
            display: flex;
            width: 2000px;
            margin: 50px auto;
            gap: 10px;
        }
        .box{
            border: 1px solid #222;
            width: 300px;
            height: 300px;
            background: url(images/img-6.jpg) no-repeat left top;
            /* background: url(images/img-6.jpg) no-repeat center; */
            /* background: url(images/img-6.jpg) no-repeat right top; */
        }
        #bg1{
            background-size: auto; /* 원래 배경 이미지 크기로 표시 */
        }
        #bg2{
            background-size: 200px; /* 너비는 200px, 높이는 자동 계산 */
        }
         #bg3{
            background-size: 50%; /* 너비는 50%, 높이는 자동 계산 */
        }
         #bg4{
            background-size: 100% 100%; /* 너비는 100%, 높이는 100% */
         }
          #bg5{
            background-size: contain; /* 요소 안 배경 이미지의 높이가 100% 다 보이도록 표시 */
        }
         #bg6{
            background-size: cover; /* 배경 이미지가 요소를 완전히 덮도록 표시 */
        }
    </style>
</head>
<body>
    <div id="container">
        <div class="box" id="bg1"></div>
        <div class="box" id="bg2"></div>
        <div class="box" id="bg3"></div>
        <div class="box" id="bg4"></div>
        <div class="box" id="bg5"></div>
        <div class="box" id="bg6"></div>
</body>
</html>
